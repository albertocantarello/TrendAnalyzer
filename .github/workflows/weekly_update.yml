name: Weekly Trend Analysis

on:
  schedule:
    - cron: "0 16 * * 4"
  workflow_dispatch:

jobs:
  analyze_and_update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout del Codice
        uses: actions/checkout@v4

      - name: Setup di Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Installazione Dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Esecuzione del Motore AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/main.py

      - name: Salvataggio e Pubblicazione
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/trends.json
          git commit -m "Aggiornamento automatico dei Trend" || echo "Nessuna variazione"
          git push
